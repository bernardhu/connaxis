{
	"ncpu": -1,
	"lbStrategy": "rr",
	"mode": "master",
	"sslPem": "server.pem",
	"sslKey": "server.key",
	"sslMode": "stdtls",
	"bufSize": 1048576,
	"chanSize": 8192,
	"listenAddrs" : ["tcp://:5000?reuseport=false"],
	"log": {
		"underlying": "zap",
		"log_level": "debug",
		"file_name": "connaxis.log",
		"max_mb_size": 100,
		"max_file_cnt": 3,
		"max_file_alive_day": 7,
		"compress": true,
		"format_time_with_ms": true,
		"format_with_filename": true
	}
}